{% extends "base.html" %}
{% block title %}Parent login{% endblock %}
{% block content %}
  <h1 class="text-2xl font-semibold mb-6">Parent login</h1>

  <form method="post" class="max-w-sm space-y-4 bg-white p-6 rounded-xl shadow-sm">
    {% csrf_token %}

    {% if error %}
      <div class="rounded-md bg-rose-100 text-rose-800 px-3 py-2 text-sm">{{ error }}</div>
    {% endif %}

    <label class="block">
      <span class="text-sm font-medium text-slate-700">Username</span>
      <input name="username" type="text" autocomplete="username" required autofocus
             class="mt-1 block w-full rounded-md border-slate-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 px-3 py-2 border">
    </label>

    <label class="block">
      <span class="text-sm font-medium text-slate-700">Password</span>
      <input name="password" type="password" autocomplete="current-password" required
             class="mt-1 block w-full rounded-md border-slate-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 px-3 py-2 border">
    </label>

    <button type="submit"
            class="w-full rounded-md bg-indigo-600 text-white font-medium py-2 hover:bg-indigo-700">
      Sign in
    </button>
  </form>

  <p class="mt-4 text-sm"><a href="{% url 'families:login_picker' %}" class="text-indigo-600 hover:underline">← Back</a></p>
{% endblock %}
