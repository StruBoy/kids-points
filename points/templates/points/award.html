{% extends "base.html" %}
{% block title %}Give points{% endblock %}
{% block content %}
  <h1 class="text-2xl font-semibold mb-6">Give points</h1>

  <form method="post" class="max-w-md bg-white p-6 rounded-xl shadow-sm space-y-4">
    {% csrf_token %}

    {% if form.non_field_errors %}
      <div class="rounded-md bg-rose-100 text-rose-800 px-3 py-2 text-sm">
        {{ form.non_field_errors }}
      </div>
    {% endif %}

    <label class="block">
      <span class="text-sm font-medium text-slate-700">Who?</span>
      <select name="kid" required
              class="mt-1 block w-full rounded-md border-slate-300 px-3 py-2 border focus:border-indigo-500 focus:ring-indigo-500">
        <option value="">Choose a kid...</option>
        {% for opt in form.kid.field.queryset %}
          <option value="{{ opt.pk }}" {% if form.kid.value|stringformat:"s" == opt.pk|stringformat:"s" %}selected{% endif %}>
            {{ opt.name }}
          </option>
        {% endfor %}
      </select>
      {% if form.kid.errors %}<div class="text-xs text-rose-600 mt-1">{{ form.kid.errors|join:" " }}</div>{% endif %}
    </label>

    <label class="block">
      <span class="text-sm font-medium text-slate-700">How many points?</span>
      <input type="number" name="amount" min="1" max="1000" required
             value="{{ form.amount.value|default:'' }}"
             class="mt-1 block w-full rounded-md border-slate-300 px-3 py-2 border focus:border-indigo-500 focus:ring-indigo-500">
      {% if form.amount.errors %}<div class="text-xs text-rose-600 mt-1">{{ form.amount.errors|join:" " }}</div>{% endif %}
    </label>

    <label class="block">
      <span class="text-sm font-medium text-slate-700">What for?</span>
      <input type="text" name="reason" maxlength="200" required
             value="{{ form.reason.value|default:'' }}"
             placeholder="e.g. cleaned up without being asked"
             class="mt-1 block w-full rounded-md border-slate-300 px-3 py-2 border focus:border-indigo-500 focus:ring-indigo-500">
      {% if form.reason.errors %}<div class="text-xs text-rose-600 mt-1">{{ form.reason.errors|join:" " }}</div>{% endif %}
    </label>

    <div class="flex gap-2">
      <button type="submit"
              class="rounded-md bg-indigo-600 text-white font-medium px-4 py-2 hover:bg-indigo-700">
        Give points
      </button>
      <a href="{% url 'points:parent_home' %}"
         class="rounded-md bg-slate-100 text-slate-700 font-medium px-4 py-2 hover:bg-slate-200">
        Cancel
      </a>
    </div>
  </form>
{% endblock %}
