{% extends "base.html" %}
{% block title %}{% if item %}Edit item{% else %}Add item{% endif %}{% endblock %}
{% block content %}
  <h1 class="text-2xl font-semibold mb-6">{% if item %}Edit item{% else %}Add item{% endif %}</h1>

  <form method="post" enctype="multipart/form-data" class="max-w-md bg-white p-6 rounded-xl shadow-sm space-y-4">
    {% csrf_token %}

    {% for field in form %}
      <label class="block">
        <span class="text-sm font-medium text-slate-700">{{ field.label }}</span>
        {{ field }}
        {% if field.errors %}<div class="text-xs text-rose-600 mt-1">{{ field.errors|join:" " }}</div>{% endif %}
      </label>
    {% endfor %}

    <div class="flex gap-2">
      <button type="submit"
              class="rounded-md bg-indigo-600 text-white font-medium px-4 py-2 hover:bg-indigo-700">
        Save
      </button>
      <a href="{% url 'store:admin_list' %}"
         class="rounded-md bg-slate-100 text-slate-700 font-medium px-4 py-2 hover:bg-slate-200">
        Cancel
      </a>
    </div>
  </form>

  <style>
    form input[type=text], form input[type=number], form input[type=file], form textarea, form select {
      margin-top: 0.25rem;
      width: 100%;
      border: 1px solid #cbd5e1;
      border-radius: 0.375rem;
      padding: 0.5rem 0.75rem;
    }
  </style>
{% endblock %}
